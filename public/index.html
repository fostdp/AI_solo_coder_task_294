<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酶促反应动力学模拟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .panel-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #00d4ff;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }
        canvas {
            width: 100%;
            height: 400px;
            border-radius: 10px;
            background: #0f0f23;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .control-label span:first-child {
            font-weight: bold;
        }
        .control-value {
            background: #00d4ff;
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: #1a1a2e;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        .btn-success {
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            color: #1a1a2e;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }
        .btn-warning {
            background: linear-gradient(45deg, #ffaa00, #ff8800);
            color: #1a1a2e;
        }
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 170, 0, 0.4);
        }
        .info-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .info-item {
            text-align: center;
            padding: 15px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
        }
        .info-item .label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .info-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }
        .formula {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 15px;
            font-family: 'Times New Roman', serif;
            font-size: 18px;
        }
        .status {
            text-align: center;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            display: block;
        }
        .status.error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            display: block;
        }
        .plot-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .plot-selector button {
            flex: 1;
            min-width: auto;
            padding: 8px 12px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .plot-selector button.active {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: #1a1a2e;
        }
        #animationCanvas {
            height: 250px;
        }
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .info-panel {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧬 酶促反应动力学模拟实验</h1>
        
        <div class="main-content">
            <div class="panel">
                <div class="panel-title">📈 反应速率曲线</div>
                <div class="plot-selector">
                    <button class="active" data-plot="michaelis">Michaelis-Menten</button>
                    <button data-plot="lineweaver">Lineweaver-Burk</button>
                    <button data-plot="hanes">Hanes-Woolf</button>
                    <button data-plot="eadie">Eadie-Hofstee</button>
                </div>
                <canvas id="rateCanvas"></canvas>
            </div>
            
            <div class="panel">
                <div class="panel-title">⏱️ 底物消耗与产物积累</div>
                <canvas id="timeCanvas"></canvas>
            </div>
        </div>
        
        <div class="main-content">
            <div class="panel">
                <div class="panel-title">🎛️ 实验参数控制</div>
                <div class="controls">
                    <div class="formula">
                        V = V<sub>max</sub> · [S] / (K<sub>m</sub> + [S])
                    </div>
                    
                    <div class="control-group">
                        <div class="control-label">
                            <span>底物浓度 [S] (mM)</span>
                            <span class="control-value" id="sValue">50</span>
                        </div>
                        <input type="range" id="sConcentration" min="1" max="200" value="50">
                    </div>
                    
                    <div class="control-group">
                        <div class="control-label">
                            <span>酶浓度 [E] (μM)</span>
                            <span class="control-value" id="eValue">10</span>
                        </div>
                        <input type="range" id="eConcentration" min="1" max="50" value="10">
                    </div>
                    
                    <div class="control-group">
                        <div class="control-label">
                            <span>米氏常数 K<sub>m</sub> (mM)</span>
                            <span class="control-value" id="kmValue">25</span>
                        </div>
                        <input type="range" id="km" min="5" max="100" value="25">
                    </div>
                    
                    <div class="control-group">
                        <div class="control-label">
                            <span>催化常数 k<sub>cat</sub> (s<sup>-1</sup>)</span>
                            <span class="control-value" id="kcatValue">100</span>
                        </div>
                        <input type="range" id="kcat" min="10" max="500" value="100">
                    </div>
                    
                    <div class="buttons">
                        <button class="btn-primary" id="startBtn">▶️ 开始反应</button>
                        <button class="btn-warning" id="pauseBtn">⏸️ 暂停</button>
                        <button class="btn-warning" id="resetBtn">🔄 重置</button>
                    </div>
                    <div class="buttons">
                        <button class="btn-success" id="saveBtn">💾 保存实验</button>
                        <button class="btn-success" id="screenshotBtn">📸 截图保存</button>
                    </div>
                </div>
                <div class="status" id="status"></div>
            </div>
            
            <div class="panel">
                <div class="panel-title">📊 实时数据</div>
                <div class="info-panel">
                    <div class="info-item">
                        <div class="label">最大反应速率 V<sub>max</sub></div>
                        <div class="value" id="vmax">0</div>
                        <div style="font-size: 12px; color: #aaa;">mM/s</div>
                    </div>
                    <div class="info-item">
                        <div class="label">当前反应速率 V</div>
                        <div class="value" id="currentV">0</div>
                        <div style="font-size: 12px; color: #aaa;">mM/s</div>
                    </div>
                    <div class="info-item">
                        <div class="label">剩余底物</div>
                        <div class="value" id="remainingS">0</div>
                        <div style="font-size: 12px; color: #aaa;">mM</div>
                    </div>
                    <div class="info-item">
                        <div class="label">生成产物</div>
                        <div class="value" id="productP">0</div>
                        <div style="font-size: 12px; color: #aaa;">mM</div>
                    </div>
                </div>
                
                <div style="margin-top: 20px;">
                    <div class="panel-title">🎨 反应动画</div>
                    <canvas id="animationCanvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="js/kineticsMath.js"></script>
    <script src="js/curvePlotter.js"></script>
    <script src="js/particleAnimation.js"></script>
    <script>
        const params = {
            s: 50,
            e: 10,
            km: 25,
            kcat: 100
        };

        let simulationState = {
            isRunning: false,
            time: 0,
            currentS: 50,
            currentP: 0
        };

        let timeData = [];
        let currentPlotType = 'michaelis';

        const kinetics = new EnzymeKineticsMath({
            Km: params.km,
            kcat: params.kcat,
            Et: params.e
        });

        const ratePlotter = new CurvePlotter('rateCanvas', {
            xAxis: { label: '底物浓度 [S] (mM)' },
            yAxis: { label: '反应速率 V (mM/s)' }
        });

        const timePlotter = new CurvePlotter('timeCanvas', {
            xAxis: { label: '时间 (s)' },
            yAxis: { label: '浓度 (mM)' }
        });

        const particleAnim = new ParticleAnimation('animationCanvas');

        function resizeCanvases() {
            const rateCanvas = document.getElementById('rateCanvas');
            const timeCanvas = document.getElementById('timeCanvas');
            const animCanvas = document.getElementById('animationCanvas');
            
            ratePlotter.resize(rateCanvas.offsetWidth, rateCanvas.offsetHeight);
            timePlotter.resize(timeCanvas.offsetWidth, timeCanvas.offsetHeight);
            particleAnim.resize(animCanvas.offsetWidth, animCanvas.offsetHeight);
            
            if (!simulationState.isRunning) {
                drawRateCurve();
                drawTimeCurve();
            }
        }

        function drawRateCurve() {
            ratePlotter.clearDatasets();
            
            let curveData;
            switch (currentPlotType) {
                case 'michaelis':
                    curveData = kinetics.getRateCurve(0, 200, 100);
                    ratePlotter.setConfig({
                        xAxis: { label: '底物浓度 [S] (mM)' },
                        yAxis: { label: '反应速率 V (mM/s)' }
                    });
                    ratePlotter.addDataset(curveData, {
                        color: '#00d4ff',
                        label: 'Michaelis-Menten',
                        showPoints: false
                    });
                    const currentPoint = [{ x: params.s, y: kinetics.getRate(params.s) }];
                    ratePlotter.addDataset(currentPoint, {
                        color: '#ff4444',
                        label: '当前点',
                        showPoints: true,
                        pointRadius: 8
                    });
                    break;
                    
                case 'lineweaver':
                    curveData = kinetics.getLineweaverBurk(10, 150, 30);
                    ratePlotter.setConfig({
                        xAxis: { label: '1/[S] (1/mM)' },
                        yAxis: { label: '1/V (s/mM)' }
                    });
                    ratePlotter.addDataset(curveData, {
                        color: '#ff6b6b',
                        label: 'Lineweaver-Burk',
                        showPoints: true,
                        pointRadius: 4
                    });
                    break;
                    
                case 'hanes':
                    curveData = kinetics.getHanesWoolf(10, 150, 30);
                    ratePlotter.setConfig({
                        xAxis: { label: '[S] (mM)' },
                        yAxis: { label: '[S]/V (s)' }
                    });
                    ratePlotter.addDataset(curveData, {
                        color: '#4dabf7',
                        label: 'Hanes-Woolf',
                        showPoints: true,
                        pointRadius: 4
                    });
                    break;
                    
                case 'eadie':
                    curveData = kinetics.getEadieHofstee(10, 150, 30);
                    ratePlotter.setConfig({
                        xAxis: { label: 'V/[S] (1/s)' },
                        yAxis: { label: 'V (mM/s)' }
                    });
                    ratePlotter.addDataset(curveData, {
                        color: '#00ff88',
                        label: 'Eadie-Hofstee',
                        showPoints: true,
                        pointRadius: 4
                    });
                    break;
            }
            
            ratePlotter.render();
        }

        function drawTimeCurve() {
            timePlotter.clearDatasets();
            
            const substrateData = timeData.map(d => ({ x: d.time, y: d.S }));
            const productData = timeData.map(d => ({ x: d.time, y: d.P }));
            
            timePlotter.addDataset(substrateData, {
                color: '#ff6b6b',
                label: '底物 [S]',
                showPoints: false
            });
            
            timePlotter.addDataset(productData, {
                color: '#00ff88',
                label: '产物 [P]',
                showPoints: false
            });
            
            timePlotter.setConfig({
                legendPosition: 'topLeft'
            });
            
            timePlotter.render();
        }

        function updateDisplay() {
            document.getElementById('sValue').textContent = params.s;
            document.getElementById('eValue').textContent = params.e;
            document.getElementById('kmValue').textContent = params.km;
            document.getElementById('kcatValue').textContent = params.kcat;
            
            document.getElementById('vmax').textContent = kinetics.getVmax().toFixed(3);
            document.getElementById('currentV').textContent = kinetics.getRate(simulationState.currentS).toFixed(3);
            document.getElementById('remainingS').textContent = simulationState.currentS.toFixed(2);
            document.getElementById('productP').textContent = simulationState.currentP.toFixed(2);
        }

        let animationId;
        let lastTime = 0;

        function simulate(timestamp) {
            if (!simulationState.isRunning) return;
            
            const deltaTime = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            
            if (deltaTime > 0.1) {
                animationId = requestAnimationFrame(simulate);
                return;
            }
            
            simulationState.time += deltaTime;
            
            const v = kinetics.getRate(simulationState.currentS);
            const deltaS = v * deltaTime;
            
            simulationState.currentS = Math.max(0, simulationState.currentS - deltaS);
            simulationState.currentP = Math.min(params.s, params.s - simulationState.currentS);
            
            timeData.push({
                time: simulationState.time,
                S: simulationState.currentS,
                P: simulationState.currentP
            });
            
            if (timeData.length > 500) {
                timeData = timeData.slice(-500);
            }
            
            if (Math.random() < 0.02) {
                particleAnim.convertToProduct();
            }
            
            drawTimeCurve();
            updateDisplay();
            
            if (simulationState.currentS > 0.001) {
                animationId = requestAnimationFrame(simulate);
            } else {
                simulationState.isRunning = false;
                particleAnim.stop();
                showStatus('反应完成！', 'success');
            }
        }

        function resetSimulation() {
            simulationState.isRunning = false;
            particleAnim.stop();
            simulationState.time = 0;
            simulationState.currentS = params.s;
            simulationState.currentP = 0;
            timeData = [{ time: 0, S: params.s, P: 0 }];
            particleAnim.reset();
            drawRateCurve();
            drawTimeCurve();
            updateDisplay();
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            setTimeout(() => {
                status.className = 'status';
            }, 3000);
        }

        async function saveExperiment() {
            const data = {
                params: { ...params },
                timestamp: new Date().toISOString()
            };
            
            try {
                const response = await fetch('/api/experiments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    showStatus('实验参数保存成功！ID: ' + result.id, 'success');
                } else {
                    showStatus('保存失败: ' + result.error, 'error');
                }
            } catch (e) {
                showStatus('保存失败: ' + e.message, 'error');
            }
        }

        async function saveScreenshot() {
            const tempCanvas = document.createElement('canvas');
            const rateCanvas = document.getElementById('rateCanvas');
            const timeCanvas = document.getElementById('timeCanvas');
            const animCanvas = document.getElementById('animationCanvas');
            
            tempCanvas.width = rateCanvas.width + timeCanvas.width;
            tempCanvas.height = Math.max(rateCanvas.height, timeCanvas.height) + animCanvas.height;
            const ctx = tempCanvas.getContext('2d');
            
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            
            ctx.drawImage(rateCanvas, 0, 0);
            ctx.drawImage(timeCanvas, rateCanvas.width, 0);
            ctx.drawImage(animCanvas, 0, Math.max(rateCanvas.height, timeCanvas.height));
            
            const image = tempCanvas.toDataURL('image/png');
            const id = Date.now();
            
            try {
                const response = await fetch('/api/screenshot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image, id })
                });
                const result = await response.json();
                if (result.success) {
                    showStatus('截图保存成功！文件名: ' + result.filename, 'success');
                } else {
                    showStatus('截图保存失败: ' + result.error, 'error');
                }
            } catch (e) {
                showStatus('截图保存失败: ' + e.message, 'error');
            }
        }

        document.getElementById('sConcentration').addEventListener('input', (e) => {
            params.s = parseInt(e.target.value);
            if (!simulationState.isRunning) {
                resetSimulation();
            }
            updateDisplay();
            drawRateCurve();
        });

        document.getElementById('eConcentration').addEventListener('input', (e) => {
            params.e = parseInt(e.target.value);
            kinetics.setParams({ Et: params.e });
            updateDisplay();
            drawRateCurve();
        });

        document.getElementById('km').addEventListener('input', (e) => {
            params.km = parseInt(e.target.value);
            kinetics.setParams({ Km: params.km });
            updateDisplay();
            drawRateCurve();
        });

        document.getElementById('kcat').addEventListener('input', (e) => {
            params.kcat = parseInt(e.target.value);
            kinetics.setParams({ kcat: params.kcat });
            updateDisplay();
            drawRateCurve();
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!simulationState.isRunning) {
                simulationState.isRunning = true;
                lastTime = performance.now();
                particleAnim.start();
                animationId = requestAnimationFrame(simulate);
                showStatus('反应开始！', 'success');
            }
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            simulationState.isRunning = false;
            particleAnim.stop();
            showStatus('反应已暂停', 'success');
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            resetSimulation();
            showStatus('实验已重置', 'success');
        });

        document.getElementById('saveBtn').addEventListener('click', saveExperiment);
        document.getElementById('screenshotBtn').addEventListener('click', saveScreenshot);

        document.querySelectorAll('.plot-selector button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.plot-selector button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPlotType = btn.dataset.plot;
                drawRateCurve();
            });
        });

        window.addEventListener('resize', resizeCanvases);
        
        resizeCanvases();
        resetSimulation();
    </script>
</body>
</html>
